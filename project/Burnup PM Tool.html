<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Burnup — Project Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="root"></div>

<script>
  // Override the API base URL here if the backend runs on a different port/host.
  // window.__BURNUP_API__ = 'http://localhost:5000';
</script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- React 19 dropped UMD builds; load via ESM CDN and expose as globals.
     Parser-inserted module scripts block DOMContentLoaded, so Babel will
     always find window.React defined when it processes the JSX files. -->
<script type="module">
  import React from 'https://esm.sh/react@19.2.6';
  import { createRoot } from 'https://esm.sh/react-dom@19.2.6/client';
  window.React = React;
  window.ReactDOM = { createRoot };
</script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script type="text/babel" src="src/api.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/chart.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/cards.jsx"></script>
<script type="text/babel" src="src/import.jsx"></script>
<script type="text/babel" src="src/auth.jsx"></script>
<script type="text/babel" src="src/admin.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<window.App />);
</script>
</body>
</html>
