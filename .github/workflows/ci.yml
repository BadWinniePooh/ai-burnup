name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  build-backend:
    name: Build .NET backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore BurnupApi/BurnupApi.csproj

      - name: Build (Release)
        run: dotnet build BurnupApi/BurnupApi.csproj --no-restore --configuration Release

  build-docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build backend image
        run: docker build -f BurnupApi/Dockerfile BurnupApi/

      - name: Build frontend image
        run: docker build -f frontend.Dockerfile .
