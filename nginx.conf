server {
    listen 80;
    root /usr/share/nginx/html;

    # .jsx files must be served as JS so Babel standalone can fetch them
    types {
        text/javascript jsx;
    }
    include /etc/nginx/mime.types;

    index "Burnup PM Tool.html";

    # Proxy all /api/* requests to the backend container
    location /api/ {
        proxy_pass         ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Serve static files; fall back to the app shell for any unknown path
    location / {
        try_files $uri $uri/ "/Burnup PM Tool.html";
    }
}
